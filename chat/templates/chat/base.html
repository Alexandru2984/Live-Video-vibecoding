<!DOCTYPE html>
<html lang="ro" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="color-scheme" content="light dark">
    <meta name="theme-color" content="#5b6fe0">
    <title>{% block title %}Chat{% endblock %} · micutu</title>

    <!-- Set the theme before first paint to avoid a flash of the wrong colors. -->
    <script nonce="{{ csp_nonce }}">
        (function () {
            try {
                var saved = localStorage.getItem('theme');
                var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                var theme = saved || (prefersDark ? 'dark' : 'light');
                document.documentElement.setAttribute('data-bs-theme', theme);
            } catch (e) {}
        })();
    </script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"
          integrity="sha384-XGjxtQfXaH2tnPFa9x+ruJTuLE3Aa6LhHSWRr1XeTyhezb4abCG4ccI5AkVDxqC+" crossorigin="anonymous">

    <style>
        :root {
            --brand-1: #6a78f0;
            --brand-2: #8a5cd0;
            --brand-grad: linear-gradient(135deg, var(--brand-1) 0%, var(--brand-2) 100%);
        }
        [data-bs-theme="light"] {
            --app-bg: radial-gradient(1200px 600px at 10% -10%, #e8ecff 0%, transparent 60%),
                      radial-gradient(1000px 500px at 110% 10%, #f3e9ff 0%, transparent 55%),
                      #f5f7fb;
            --surface: rgba(255, 255, 255, 0.86);
            --surface-border: rgba(20, 24, 60, 0.08);
        }
        [data-bs-theme="dark"] {
            --app-bg: radial-gradient(1200px 600px at 10% -10%, #1a1f3a 0%, transparent 60%),
                      radial-gradient(1000px 500px at 110% 10%, #2a1c3d 0%, transparent 55%),
                      #0e1018;
            --surface: rgba(28, 31, 48, 0.82);
            --surface-border: rgba(255, 255, 255, 0.08);
            --bs-body-color: #e7e9f3;
        }

        body {
            background: var(--app-bg) fixed;
            min-height: 100vh;
            min-height: 100dvh;
        }

        .navbar.app-nav {
            background: var(--brand-grad);
            box-shadow: 0 2px 18px rgba(40, 30, 90, 0.25);
        }
        .navbar.app-nav .navbar-brand,
        .navbar.app-nav .nav-link,
        .navbar.app-nav .navbar-text { color: #fff !important; }
        .navbar-brand { font-weight: 700; letter-spacing: .2px; }

        .surface {
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--surface-border);
            border-radius: 18px;
            box-shadow: 0 12px 40px rgba(25, 20, 60, 0.18);
        }

        .card { border-radius: 16px; }

        .btn-brand {
            background: var(--brand-grad);
            border: none;
            color: #fff;
        }
        .btn-brand:hover { color: #fff; filter: brightness(1.07); }

        .theme-toggle {
            border: 1px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            width: 38px; height: 38px;
            border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
            transition: background-color .2s ease;
        }
        .theme-toggle:hover { background: rgba(255, 255, 255, 0.25); color: #fff; }

        /* Render long words / pasted URLs without breaking the layout. */
        .message-content { overflow-wrap: anywhere; word-break: break-word; }

        @media (max-width: 575.98px) {
            .container { padding-left: 12px; padding-right: 12px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar app-nav navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'chat:index' %}">
                <i class="bi bi-chat-dots-fill"></i> micutu chat
            </a>
            <div class="d-flex align-items-center gap-2 ms-auto">
                <button id="themeToggle" type="button" class="theme-toggle" title="Schimbă tema" aria-label="Schimbă tema">
                    <i class="bi bi-moon-stars"></i>
                </button>
                {% if user.is_authenticated %}
                    <span class="navbar-text d-none d-sm-inline me-1">
                        <i class="bi bi-person-circle"></i> {{ user.username }}
                    </span>
                    <form method="post" action="{% url 'chat:logout' %}" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">
                            <i class="bi bi-box-arrow-right"></i>
                            <span class="d-none d-sm-inline">Deconectare</span>
                        </button>
                    </form>
                {% else %}
                    <a class="btn btn-outline-light btn-sm" href="{% url 'chat:login' %}">
                        <i class="bi bi-box-arrow-in-right"></i>
                        <span class="d-none d-sm-inline">Conectare</span>
                    </a>
                    <a class="btn btn-light btn-sm" href="{% url 'chat:register' %}">
                        <i class="bi bi-person-plus"></i>
                        <span class="d-none d-sm-inline">Cont nou</span>
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container py-4 py-lg-5">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script nonce="{{ csp_nonce }}">
        (function () {
            var toggle = document.getElementById('themeToggle');
            var icon = toggle ? toggle.querySelector('i') : null;
            function sync() {
                var dark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
                if (icon) icon.className = dark ? 'bi bi-sun-fill' : 'bi bi-moon-stars';
            }
            sync();
            if (toggle) {
                toggle.addEventListener('click', function () {
                    var dark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
                    var next = dark ? 'light' : 'dark';
                    document.documentElement.setAttribute('data-bs-theme', next);
                    try { localStorage.setItem('theme', next); } catch (e) {}
                    sync();
                });
            }
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
