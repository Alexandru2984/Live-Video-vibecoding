<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Chat WebSocket{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .chat-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .navbar-brand {
            font-weight: bold;
            color: #fff !important;
        }
        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(45deg, #764ba2, #667eea);
        }
        
        /* Video Chat Styles */
        .video-container {
            position: relative;
        }
        
        .video-container video {
            border: 2px solid #dee2e6;
            transition: border-color 0.3s ease;
        }
        
        .video-container video:hover {
            border-color: #667eea;
        }
        
        .video-container.active video {
            border-color: #28a745;
            box-shadow: 0 0 10px rgba(40, 167, 69, 0.3);
        }
        
        #localVideo {
            transform: scaleX(-1); /* Mirror effect pentru video local */
        }
        
        .video-controls {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            border-radius: 25px;
            padding: 5px 15px;
        }
        
        .video-controls button {
            border: none;
            background: transparent;
            color: white;
            margin: 0 5px;
            padding: 8px 12px;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }
        
        .video-controls button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .video-controls button.muted {
            background: #dc3545;
        }
        
        .message.video-notification {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border-radius: 15px;
            padding: 10px 15px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="background: rgba(0,0,0,0.1);">
        <div class="container">
            <a class="navbar-brand" href="{% url 'chat:index' %}">
                <i class="bi bi-chat-dots"></i> Chat WebSocket
            </a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <span class="navbar-text me-3">
                        <i class="bi bi-person-circle"></i> Bună, {{ user.username }}!
                    </span>
                    <form method="post" action="{% url 'chat:logout' %}" class="d-inline">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-light btn-sm">
                            <i class="bi bi-box-arrow-right"></i> Deconectare
                        </button>
                    </form>
                {% else %}
                    <a class="btn btn-outline-light btn-sm" href="{% url 'chat:login' %}">
                        <i class="bi bi-box-arrow-in-right"></i> Conectare
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="chat-container p-4">
            {% block content %}
            {% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}
    {% endblock %}
</body>
</html>
